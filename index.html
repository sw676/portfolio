<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cinematic Portfolio</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Helvetica, Arial; }
canvas { display:block; }
#title {
  position:absolute;
  bottom:40px;
  left:20px;
  color:white;
  font-size:18px;
  letter-spacing:4px;
  opacity:0.8;
}
</style>
</head>
<body>
<div id="title">YOUR NAME — PORTFOLIO</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050608);
scene.fog = new THREE.FogExp2(0x050608, 0.02);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0,2,8);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

// lights
scene.add(new THREE.AmbientLight(0x222222));
const light = new THREE.PointLight(0x88ccff, 3, 100);
light.position.set(5,5,5);
scene.add(light);

// planets data
const planetData = [
  { name:"CAD", url:"/cad.html", color:0x88ccff, pos:[-4,1,-5] },
  { name:"3D", url:"/3d.html", color:0xff8844, pos:[4,2,-6] },
  { name:"UI", url:"/ui.html", color:0x66ff99, pos:[0,3,-4] }
];

const planets = [];

planetData.forEach(data => {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.8, 32, 32),
    new THREE.MeshStandardMaterial({
      color:data.color,
      emissive:data.color,
      emissiveIntensity:0.3
    })
  );

  mesh.position.set(...data.pos);
  mesh.userData = data;

  scene.add(mesh);
  planets.push(mesh);
});

// raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovered = null;

addEventListener("mousemove", e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

addEventListener("click", () => {
  if (hovered) {
    window.location.href = hovered.userData.url;
  }
});

function updateInteraction() {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(planets);

  hovered = null;

  planets.forEach(p => p.scale.set(1,1,1));

  if (intersects.length > 0) {
    hovered = intersects[0].object;
    hovered.scale.set(1.5,1.5,1.5);
  }
}

// subtle float
function animatePlanets() {
  planets.forEach((p,i)=>{
    p.position.y += Math.sin(Date.now()*0.001 + i)*0.002;
    p.rotation.y += 0.002;
  });
}

function animate(){
  requestAnimationFrame(animate);

  updateInteraction();
  animatePlanets();

  renderer.render(scene, camera);
}

animate();

addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
