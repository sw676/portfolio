<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>3D Portfolio Drive</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: sans-serif;
      z-index: 10;
    }
  </style>
</head>
<body>
<div id="ui">WASD to drive</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

// ---------- Scene ----------
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xa0a0a0, 10, 100);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ---------- Light ----------
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.3));

// ---------- Ground ----------
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d6a4f });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// ---------- Car ----------
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1, 0.5, 2),
  new THREE.MeshStandardMaterial({ color: 0xff0000 })
);
car.position.y = 0.5;
scene.add(car);

// ---------- Simple buildings ----------
for (let i = 0; i < 30; i++) {
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(
      1 + Math.random() * 3,
      1 + Math.random() * 10,
      1 + Math.random() * 3
    ),
    new THREE.MeshStandardMaterial({ color: 0x888888 })
  );
  b.position.set(
    (Math.random() - 0.5) * 80,
    0.5,
    (Math.random() - 0.5) * 80
  );
  scene.add(b);
}

// ---------- Controls ----------
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// ---------- Movement ----------
let speed = 0;
let rotation = 0;

function updateCar() {
  const accel = 0.002;
  const maxSpeed = 0.2;
  const friction = 0.98;

  // forward/backward
  if (keys["w"]) speed += accel;
  if (keys["s"]) speed -= accel;

  speed *= friction;
  speed = Math.max(-maxSpeed, Math.min(maxSpeed, speed));

  // steering
  if (keys["a"]) rotation += 0.03;
  if (keys["d"]) rotation -= 0.03;

  car.rotation.y = rotation;

  car.position.x += Math.sin(rotation) * speed * 10;
  car.position.z += Math.cos(rotation) * speed * 10;
}

// ---------- Camera follow ----------
function updateCamera() {
  const offset = new THREE.Vector3(
    Math.sin(rotation) * -5,
    3,
    Math.cos(rotation) * -5
  );

  camera.position.lerp(
    new THREE.Vector3(
      car.position.x + offset.x,
      car.position.y + offset.y,
      car.position.z + offset.z
    ),
    0.1
  );

  camera.lookAt(car.position);
}

// ---------- Loop ----------
function animate() {
  requestAnimationFrame(animate);

  updateCar();
  updateCamera();

  renderer.render(scene, camera);
}

animate();

// ---------- Resize ----------
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
