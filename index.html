<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cinematic Portfolio</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Helvetica, Arial; }
canvas { display:block; }
#title {
  position:absolute;
  bottom:40px;
  left:20px;
  color:white;
  font-size:18px;
  letter-spacing:4px;
  opacity:0.8;
}
</style>
</head>
<body>
<div id="title">YOUR NAME — PORTFOLIO</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020204);
scene.fog = new THREE.FogExp2(0x020204, 0.015);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0,2,10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

// lighting
scene.add(new THREE.AmbientLight(0x111111));
const key = new THREE.PointLight(0xffffff, 2, 100);
key.position.set(5,5,5);
scene.add(key);

// starfield
const stars = new THREE.BufferGeometry();
const starCount = 1000;
const positions = [];

for(let i=0;i<starCount;i++){
  positions.push((Math.random()-0.5)*200);
  positions.push((Math.random()-0.5)*200);
  positions.push((Math.random()-0.5)*200);
}

stars.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));

const starMat = new THREE.PointsMaterial({color:0xffffff, size:0.5});
const starField = new THREE.Points(stars, starMat);
scene.add(starField);

// planets
const planetData = [
  { name:"CAD", url:"/cad.html", color:0x4fc3f7, pos:[-5,1,-8], size:1.2 },
  { name:"3D", url:"/3d.html", color:0xff7043, pos:[5,2,-10], size:1.5 },
  { name:"UI", url:"/ui.html", color:0x81c784, pos:[0,3,-6], size:1 }
];

const planets = [];

planetData.forEach(data => {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(data.size, 64, 64),
    new THREE.MeshStandardMaterial({
      color:data.color,
      metalness:0.6,
      roughness:0.4,
      emissive:data.color,
      emissiveIntensity:0.2
    })
  );

  mesh.position.set(...data.pos);
  mesh.userData = data;

  scene.add(mesh);
  planets.push(mesh);
});

// interaction
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovered = null;

addEventListener("mousemove", e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

addEventListener("click", () => {
  if (hovered) {
    window.location.href = hovered.userData.url;
  }
});

function updateInteraction() {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(planets);

  hovered = null;

  planets.forEach(p => p.scale.lerp(new THREE.Vector3(1,1,1), 0.1));

  if (intersects.length > 0) {
    hovered = intersects[0].object;
    hovered.scale.lerp(new THREE.Vector3(1.6,1.6,1.6), 0.2);
  }
}

// animation
function animatePlanets(time) {
  planets.forEach((p,i)=>{
    p.rotation.y += 0.003;
    p.position.y += Math.sin(time*0.001 + i)*0.003;
  });
}

function animate(time){
  requestAnimationFrame(animate);

  updateInteraction();
  animatePlanets(time);

  renderer.render(scene, camera);
}

animate();

addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
